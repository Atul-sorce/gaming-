<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerGear Pro - Ultimate Gaming Headsets & Mics</title>
    <meta name="description" content="Premium gaming headsets, microphones with RGB lighting, zero latency & crystal clear audio. Level up your game!">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' fill='%23ff006e'>🎧</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-neon: #ff006e;
            --secondary-neon: #00d4ff;
            --accent-purple: #8338ec;
            --dark-bg: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            color: #fff;
            overflow-x: hidden;
            background: var(--dark-bg);
        }

        /* INTENSE GAMING BACKGROUND */
        .gaming-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(ellipse at top, #1a0033 0%, transparent 50%),
                radial-gradient(ellipse at bottom, #000428 0%, transparent 50%),
                linear-gradient(45deg, #0c0c0c 0%, #1a0033 30%, #0c0c0c 70%);
        }

        /* Animated Matrix Rain */
        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.1;
        }

        .matrix-rain::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(90deg, transparent 98%, rgba(0, 255, 255, 0.03) 100%),
                linear-gradient(0deg, transparent 98%, rgba(255, 0, 110, 0.03) 100%);
            background-size: 50px 50px;
            animation: matrixRain 20s linear infinite;
        }

        @keyframes matrixRain {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 50px 1000px, 100px 1000px; }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--primary-neon) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 15s infinite linear;
        }

        .particle:nth-child(1) { width: 4px; height: 4px; left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { width: 6px; height: 6px; left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { width: 3px; height: 3px; left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { width: 5px; height: 5px; left: 50%; animation-delay: 1s; }
        .particle:nth-child(5) { width: 4px; height: 4px; left: 70%; animation-delay: 3s; }
        .particle:nth-child(6) { width: 7px; height: 7px; left: 80%; animation-delay: 5s; }
        .particle:nth-child(7) { width: 3px; height: 3px; left: 90%; animation-delay: 6s; }

        @keyframes float {
            0% { 
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% { 
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1.5rem 5%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 0, 110, 0.3);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon), var(--accent-purple));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: neonGlow 2s ease-in-out infinite alternate;
            text-shadow: 0 0 30px var(--primary-neon);
        }

        @keyframes neonGlow {
            0% { filter: drop-shadow(0 0 5px var(--primary-neon)); }
            100% { filter: drop-shadow(0 0 20px var(--primary-neon)); }
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 3rem;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            position: relative;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links a::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            transition: width 0.3s ease;
        }

        .nav-links a:hover::before {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--secondary-neon);
            text-shadow: 0 0 15px var(--secondary-neon);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 5%;
            position: relative;
        }

        .hero-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 8vw, 6rem);
            margin-bottom: 2rem;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon), var(--accent-purple));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 4s ease infinite;
            text-shadow: 0 0 40px var(--primary-neon);
            letter-spacing: 3px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .hero-subtitle {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            margin-bottom: 3rem;
            opacity: 0.9;
            max-width: 700px;
            line-height: 1.6;
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 4rem;
        }

        .btn-neon {
            padding: 1.2rem 3rem;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            box-shadow: 0 0 30px var(--primary-neon);
            color: #fff;
        }

        .btn-secondary {
            background: transparent;
            color: var(--secondary-neon);
            border: 2px solid var(--secondary-neon);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .btn-neon:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(255, 0, 110, 0.6);
        }

        /* Products */
        .products-section {
            padding: 120px 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 5rem;
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 6vw, 4rem);
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            position: relative;
        }

        .section-subtitle {
            font-size: 1.3rem;
            opacity: 0.8;
            max-width: 600px;
            margin: 0 auto;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 3rem;
        }

        .product-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }

        .product-card:hover::before {
            left: 100%;
        }

        .product-card:hover {
            transform: translateY(-20px);
            border-color: var(--primary-neon);
            box-shadow: 0 30px 60px rgba(255, 0, 110, 0.4);
        }

        .product-icon {
            font-size: 5rem;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--primary-neon));
        }

        .product-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            color: var(--secondary-neon);
            margin-bottom: 1rem;
            text-shadow: 0 0 10px var(--secondary-neon);
        }

        .product-price {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--primary-neon);
            margin-bottom: 1.5rem;
            text-shadow: 0 0 20px var(--primary-neon);
        }

        .product-features {
            list-style: none;
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .product-features li {
            padding: 0.8rem 0;
            opacity: 0.9;
            position: relative;
            padding-left: 2rem;
        }

        .product-features li::before {
            content: '⚡';
            position: absolute;
            left: 0;
            color: var(--secondary-neon);
        }

        /* Features Section */
        .features-section {
            padding: 120px 5%;
            background: rgba(0, 0, 0, 0.5);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
            max-width: 1200px;
            margin: 4rem auto 0;
        }

        .feature-card {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--glass-bg);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .feature-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
        }

        .feature-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .feature-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* CTA Section */
        .cta-section {
            padding: 120px 5%;
            text-align: center;
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.15), rgba(0, 212, 255, 0.1));
        }

        /* Footer */
        .footer {
            background: rgba(10, 10, 10, 0.95);
            padding: 4rem 5% 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
        }

        .footer-section h3 {
            color: var(--secondary-neon);
            margin-bottom: 1.5rem;
            font-family: 'Orbitron', monospace;
        }

        .footer-section a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            display: block;
            margin-bottom: 0.8rem;
            transition: all 0.3s ease;
        }

        .footer-section a:hover {
            color: var(--primary-neon);
            transform: translateX(10px);
        }

        .footer-bottom {
            text-align: center;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0.7;
            font-size: 0.9rem;
        }

        /* Animations */
        .fade-in {
            opacity: 0;
            transform: translateY(50px);
            transition: all 1s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links { gap: 1.5rem; }
            .hero-title { font-size: 3rem; }
            .cta-buttons { flex-direction: column; align-items: center; }
            .products-grid { grid-template-columns: 1fr; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.8);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--primary-neon), var(--secondary-neon));
            border-radius: 10px;
        }
    </style>
</head>
